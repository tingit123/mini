<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản lý chung cư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Mini Apartment</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-danger" onclick="api.logout()">Đăng xuất</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Tổng quan</h2>
        <div class="row mt-4" id="stats-container">
            <!-- Stats will be loaded here -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function loadDashboard() {
            const response = await api.fetchWithAuth('/dashboard/stats');
            if (response && response.ok) {
                const data = await response.json();
                document.getElementById('stats-container').innerHTML = `
                    <div class="col-md-3">
                        <div class="card bg-primary text-white mb-3">
                            <div class="card-body">
                                <h5>Tổng số phòng</h5>
                                <h2>${data.total_rooms}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success text-white mb-3">
                            <div class="card-body">
                                <h5>Phòng đang thuê</h5>
                                <h2>${data.rented_rooms}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-dark mb-3">
                            <div class="card-body">
                                <h5>Phòng trống</h5>
                                <h2>${data.available_rooms}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white mb-3">
                            <div class="card-body">
                                <h5>Tổng cư dân</h5>
                                <h2>${data.total_residents}</h2>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
